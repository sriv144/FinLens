name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run unittest suite
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      NVIDIA_API_KEY: nvapi-ci-dummy-key
      EDGAR_USER_AGENT: "FinLens CI ci@example.com"
      CHROMA_DB_PATH: .chroma_ci
      BACKEND_URL: http://127.0.0.1:8000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile check
        run: python -m compileall backend frontend tests

      - name: Run unittest
        run: python -m unittest discover -s tests -v
        continue-on-error: true
