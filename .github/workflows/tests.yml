name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11']
    env:
      # Tests must not require real API credentials. Provide harmless placeholders
      # so any module that reads env vars at import time still loads.
      NVIDIA_API_KEY: dummy
      EDGAR_USER_AGENT: 'FinLens CI ci@example.com'
      ANTHROPIC_API_KEY: dummy
      PYTHONDONTWRITEBYTECODE: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest

      - name: Compile-all syntax check
        run: python -m compileall backend frontend tests

      - name: Run unittest discover
        # The repo's existing tests are unittest-based (per README) and live under tests/.
        run: python -m unittest discover -s tests -v
